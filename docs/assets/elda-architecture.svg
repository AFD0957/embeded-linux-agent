<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 780" role="img" aria-label="ELDA system architecture">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <style>
      text { font-family: Segoe UI, Helvetica Neue, Arial, sans-serif; fill: #1e293b; }
      .ts { font-size: 11px; }
      .tm { font-size: 12.5px; font-weight: 600; }
      .tt { font-size: 20px; font-weight: 700; fill: url(#brand); }
      .lane-title { font-size: 11px; font-weight: 700; fill: #334155; }
      .lane-sub { font-size: 9.5px; fill: #64748b; }
      .rel { font-size: 10.5px; fill: #475569; font-weight: 500; }
    </style>
  </defs>

  <rect width="1180" height="780" fill="#ffffff"/>
  <text x="40" y="40" class="tt">ELDA System Architecture</text>
  <text x="40" y="62" class="ts" fill="#64748b">分层视图 · 自上而下：宿主机 → 客户端 → 控制面 → 数据面 → 工程区 → 外部服务</text>
  <line x1="40" y1="74" x2="1140" y2="74" stroke="#e2e8f0"/>

  <!-- L1 Developer -->
  <rect x="24" y="88" width="1132" height="86" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="24" y="88" width="132" height="86" rx="12" fill="#eef2f7"/>
  <line x1="156" y1="92" x2="156" y2="170" stroke="#e2e8f0"/>
  <text x="90" y="118" text-anchor="middle" class="lane-title">DEVELOPER</text>
  <text x="90" y="136" text-anchor="middle" class="lane-sub">HOST</text>
  <g filter="url(#shadow)">
    <rect x="176" y="110" width="195" height="52" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.25"/>
    <text x="188" y="132" class="tm" fill="#0f766e">Terminal A</text>
    <text x="188" y="150" class="ts" fill="#64748b">elda executor start</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="395" y="110" width="195" height="52" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.25"/>
    <text x="407" y="132" class="tm" fill="#0f766e">Terminal B</text>
    <text x="407" y="150" class="ts" fill="#64748b">elda ingest / plan / build …</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="614" y="110" width="522" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.25"/>
    <text x="626" y="132" class="tm" fill="#1e293b">Ubuntu 16.04 x86_64</text>
    <text x="626" y="150" class="ts" fill="#64748b">Python 3.11 · cross toolchain · Docker client</text>
  </g>

  <!-- relation 1 -->
  <rect x="176" y="182" width="960" height="22" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="656" y="197" text-anchor="middle" class="rel">Terminal B 驱动 elda CLI · Terminal A 驱动 Tool Executor（WebSocket 长连接）</text>

  <!-- L2 Client -->
  <rect x="24" y="212" width="1132" height="96" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="24" y="212" width="132" height="96" rx="12" fill="#eef2f7"/>
  <line x1="156" y1="216" x2="156" y2="304" stroke="#e2e8f0"/>
  <text x="90" y="242" text-anchor="middle" class="lane-title">CLIENT</text>
  <text x="90" y="260" text-anchor="middle" class="lane-sub">elda/</text>
  <g filter="url(#shadow)">
    <rect x="176" y="234" width="255" height="62" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.25"/>
    <text x="188" y="256" class="tm" fill="#0f766e">elda CLI</text>
    <text x="188" y="274" class="ts" fill="#64748b">Typer · elda.yaml · HTTP 任务提交</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="455" y="234" width="681" height="62" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="1.25"/>
    <text x="467" y="256" class="tm" fill="#b45309">Tool Executor</text>
    <text x="467" y="274" class="ts" fill="#64748b">pdf · git · build · deploy · board 等本地工具执行</text>
  </g>

  <!-- relation 2 -->
  <rect x="176" y="316" width="960" height="22" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="656" y="331" text-anchor="middle" class="rel">elda CLI 与 Tool Executor 均对接 elda-api（HTTP 任务 + WebSocket 工具调用）</text>

  <!-- L3 Control -->
  <rect x="24" y="346" width="1132" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="24" y="346" width="132" height="100" rx="12" fill="#eef2f7"/>
  <line x1="156" y1="350" x2="156" y2="442" stroke="#e2e8f0"/>
  <text x="90" y="376" text-anchor="middle" class="lane-title">CONTROL</text>
  <text x="90" y="394" text-anchor="middle" class="lane-sub">elda-api/</text>
  <g filter="url(#shadow)">
    <rect x="176" y="368" width="290" height="66" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.25"/>
    <text x="188" y="390" class="tm" fill="#4338ca">FastAPI Gateway :8000</text>
    <text x="188" y="408" class="ts" fill="#64748b">REST /v1/tasks · WebSocket /v1/executor/ws</text>
    <text x="188" y="424" class="ts" fill="#64748b">host network · 127.0.0.1</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="488" y="368" width="648" height="66" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.25"/>
    <text x="500" y="390" class="tm" fill="#4338ca">PipelineOrchestrator + Agents</text>
    <text x="500" y="408" class="ts" fill="#64748b">Extractor · Planner · Coder · Fixer · Diagnostician · Report</text>
    <text x="500" y="424" class="ts" fill="#64748b">ExecutorBridge 调度本地 tool_call</text>
  </g>

  <!-- relation 3 -->
  <rect x="176" y="454" width="960" height="22" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="656" y="469" text-anchor="middle" class="rel">Orchestrator 读写数据面 · Agents 调用外部 LLM</text>

  <!-- L4 Data -->
  <rect x="24" y="484" width="1132" height="92" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="24" y="484" width="132" height="92" rx="12" fill="#eef2f7"/>
  <line x1="156" y1="488" x2="156" y2="572" stroke="#e2e8f0"/>
  <text x="90" y="514" text-anchor="middle" class="lane-title">DATA</text>
  <text x="90" y="532" text-anchor="middle" class="lane-sub">compose</text>
  <g filter="url(#shadow)">
    <rect x="176" y="506" width="220" height="56" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.25"/>
    <text x="188" y="528" class="tm" fill="#1d4ed8">PostgreSQL</text>
    <text x="188" y="546" class="ts" fill="#64748b">tasks · executors</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="416" y="506" width="200" height="56" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.25"/>
    <text x="428" y="528" class="tm" fill="#1d4ed8">Redis</text>
    <text x="428" y="546" class="ts" fill="#64748b">task / tool_call queue</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="636" y="506" width="200" height="56" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.25"/>
    <text x="648" y="528" class="tm" fill="#1d4ed8">MinIO</text>
    <text x="648" y="546" class="ts" fill="#64748b">PDF · build logs</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="856" y="506" width="280" height="56" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.25"/>
    <text x="868" y="528" class="tm" fill="#1d4ed8">Milvus</text>
    <text x="868" y="546" class="ts" fill="#64748b">RAG · kernel / datasheet</text>
  </g>

  <!-- relation 4 -->
  <rect x="176" y="584" width="960" height="22" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="656" y="599" text-anchor="middle" class="rel">Tool Executor 读写工程目录 · deploy 产物面向目标板</text>

  <!-- L5 Project -->
  <rect x="24" y="614" width="1132" height="92" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="24" y="614" width="132" height="92" rx="12" fill="#eef2f7"/>
  <line x1="156" y1="618" x2="156" y2="702" stroke="#e2e8f0"/>
  <text x="90" y="644" text-anchor="middle" class="lane-title">PROJECT</text>
  <text x="90" y="662" text-anchor="middle" class="lane-sub">demo/</text>
  <g filter="url(#shadow)">
    <rect x="176" y="636" width="190" height="56" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="1.25"/>
    <text x="188" y="658" class="tm" fill="#15803d">elda.yaml + board/</text>
    <text x="188" y="676" class="ts" fill="#64748b">DTS · kernel.config</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="384" y="636" width="190" height="56" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="1.25"/>
    <text x="396" y="658" class="tm" fill="#15803d">workspace/</text>
    <text x="396" y="676" class="ts" fill="#64748b">register_map · verified</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="592" y="636" width="190" height="56" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="1.25"/>
    <text x="604" y="658" class="tm" fill="#15803d">vendor/kernel/</text>
    <text x="604" y="676" class="ts" fill="#64748b">linux-imx · patches</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="636" width="150" height="56" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="1.25"/>
    <text x="812" y="658" class="tm" fill="#15803d">deploy/</text>
    <text x="812" y="676" class="ts" fill="#64748b">tftp/ · nfs/</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="968" y="636" width="176" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.25"/>
    <text x="980" y="658" class="tm" fill="#b91c1c">Target Board</text>
    <text x="980" y="676" class="ts" fill="#64748b">i.MX6ULL · ICM20608 · IIO</text>
  </g>

  <!-- relation 5 -->
  <rect x="176" y="714" width="960" height="22" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="656" y="729" text-anchor="middle" class="rel">Agents 经 HTTPS 调用百炼 / DeepSeek（模型路由，非自托管）</text>

  <!-- L6 External -->
  <rect x="24" y="744" width="1132" height="36" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="24" y="744" width="132" height="36" rx="12" fill="#eef2f7"/>
  <line x1="156" y1="748" x2="156" y2="776" stroke="#e2e8f0"/>
  <text x="90" y="766" text-anchor="middle" class="lane-title">EXTERNAL</text>
  <g filter="url(#shadow)">
    <rect x="176" y="750" width="968" height="24" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.1"/>
    <text x="660" y="766" text-anchor="middle" class="tm" fill="#7c3aed">Bailian (DashScope) · DeepSeek · extract / plan / generate / fix</text>
  </g>
</svg>
